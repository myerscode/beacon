name: Tests

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop, feature/** ]

permissions:
  contents: read

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        php-versions: [ '8.5' ]

    name: Unit - PHP ${{ matrix.php-versions }} - ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: curl, dom, json, mbstring, xml, zip
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts
      - name: Run unit tests
        run: vendor/bin/phpunit --testdox --no-coverage --exclude-group=integration

  integration:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        php-versions: [ '8.5' ]

    name: Integration - PHP ${{ matrix.php-versions }} - ${{ matrix.os }}
    env:
      PANTHER_NO_SANDBOX: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: curl, dom, json, mbstring, xml, zip
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      - name: Run integration tests
        run: vendor/bin/phpunit --testdox --no-coverage --group=integration
